[project]
site_name = "CustomRequest"
site_description = "Documentation for CustomRequest, the effective routing plugin for MODX."
site_author = "Treehill Studio"
site_url = "https://jako.github.io/CustomRequest/"
repo_url = "https://github.com/Jako/CustomRequest/"
repo_name = "Jako/CustomRequest"
copyright = """
&copy; 2013-2026 <a href="https://treehillstudio.com">Treehill Studio</a>
"""
nav = [
    "index.md",
    "installation.md",
    "usage.md",
    "examples.md",
    "changelog.md",
    "contributors.md"
]
extra_css = ["assets/stylesheets/treehillstudio.css"]

[project.theme]
custom_dir = "/Users/jako/Documents/MODX/Zensical/TreehillStudio"
favicon = "assets/favicon.png"
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.extra.analytics]
provider = "matomo"
url = "matomo.treehillstudio.com"
site = 40

[[project.extra.social]]
name = "Jako on GitHub"
icon = "fontawesome/brands/github"
link = "https://github.com/Jako"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.footnotes]

[project.markdown_extensions.zensical.extensions.glightbox]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs", "core"]

[project.markdown_extensions.pymdownx.superfences]
